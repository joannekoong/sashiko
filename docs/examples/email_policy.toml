# Sashiko Email Policy Example
#
# Copy this file to your project root as email_policy.toml and adjust.
# This file controls how Sashiko sends (or suppresses) review emails.

[defaults]
# Whether the bot is allowed to send emails to public mailing lists.
# If false, emails will be restricted to private recipients (author/maintainers).
reply_all = false

# Whether to send the review email to the author of the patch.
reply_to_author = false

# Whether to include individual recipients (non-mailing-list) in the review email.
cc_individuals = false

# If true, the bot will completely mute (not send) emails for this scope.
mute_all = true

# A list of static email addresses that should always receive a copy (CC'd).
cc = []

# A list of author email addresses that will be completely ignored by the system,
# meaning their submissions will never be considered as patches and will never be reviewed.
ignored_emails = []

# Whether to send an email even when no issues are found.
# If true, Sashiko will send a reply indicating that the review was positive.
send_positive_review = false

# --- Patchwork integration examples ---
#
# API mode: direct REST API calls with retry-queuing (3 attempts).
# Requires a maintainer API token. The token can also be injected via
# the SASHIKO_PATCHWORK_TOKEN environment variable.
#
# [subsystems.net.patchwork]
# enabled = true
# api_url = "https://patchwork.kernel.org/api/1.3"
# token = "your-api-token"

# Email mode: sends a structured notification email that a local script
# (e.g. pw_tools) can parse and use to post the check.
#
# [subsystems.linux-media.patchwork]
# enabled = true
# email = "pw-bot@lists.example.org"

# Both modes simultaneously:
#
# [subsystems.dri-devel.patchwork]
# enabled = true
# api_url = "https://patchwork.freedesktop.org/api/1.3"
# token = "your-api-token"
# email = "backup-bot@lists.example.org"

# Severity filtering and check state mapping:
# min_severity excludes findings below the threshold entirely.
# fail_severity controls which new findings trigger "fail" vs "warning".
# Pre-existing findings are shown in the description but never affect state.
# Default fail_severity is "High" (High+ new = fail, Medium/Low new = warning).
#
# [subsystems.net.patchwork]
# enabled = true
# api_url = "https://patchwork.kernel.org/api/1.3"
# min_severity = "Medium"
# fail_severity = "High"
